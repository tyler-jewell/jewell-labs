manifest_version: 1
name: local-llm-server
version: 0.2.1
author: tyler-jewell
kind: standalone
description: >-
  Hermes dashboard plugin. High-level GPU metrics for your local Ollama
  servers (Apple Metal / NVIDIA / Jetson, auto-detected) plus a live stream of
  Ollama API calls + token rate. Multi-host and config-driven — hosts are
  declared in config.yaml (localhost by default), so it is fully
  host/codebase-agnostic with no baked-in machine names or secrets.
# Pure dashboard plugin: no tools or hooks. The dashboard tab is discovered
# from dashboard/manifest.json; register() below is a no-op.
provides_tools: []
provides_hooks: []
